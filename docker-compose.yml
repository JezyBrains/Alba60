
services:
  backend:
    build:
      context: ./turufu-advisor/backend
    container_name: alba60-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./turufu-advisor/frontend
      args:
        - NEXT_PUBLIC_API_URL=http://144.91.69.240:8000
        - NEXT_PUBLIC_WS_URL=ws://144.91.69.240:8000/ws/game
    container_name: alba60-frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dokploy-network

  # ── DEBUG SERVICE ─────────────────────────────────────────────────────────
  # traefik/whoami responds with request headers + container info.
  # If https://debug.144.91.69.240.nip.io works → Traefik labels + network OK.
  # If it also 404s → the network name 'dokploy-network' is wrong.
  # Remove this service once routing is confirmed.
  debug:
    image: traefik/whoami
    container_name: alba60-debug
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alba60-debug.rule=Host(`debug.144.91.69.240.nip.io`)"
      - "traefik.http.routers.alba60-debug.entrypoints=websecure"
      - "traefik.http.routers.alba60-debug.tls.certresolver=letsencrypt"
      - "traefik.http.services.alba60-debug.loadbalancer.server.port=80"
      # Also try plain HTTP in case TLS is the issue
      - "traefik.http.routers.alba60-debug-http.rule=Host(`debug.144.91.69.240.nip.io`)"
      - "traefik.http.routers.alba60-debug-http.entrypoints=web"
      - "traefik.http.services.alba60-debug-http.loadbalancer.server.port=80"

volumes:
  backend_logs:

networks:
  dokploy-network:
    external: true
