
services:
  backend:
    build:
      context: ./turufu-advisor/backend
    container_name: alba60-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./turufu-advisor/frontend
      args:
        - NEXT_PUBLIC_API_URL=https://alba.144.91.69.240.nip.io
        - NEXT_PUBLIC_WS_URL=wss://alba.144.91.69.240.nip.io/ws/game
    container_name: alba60-frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_logs:
