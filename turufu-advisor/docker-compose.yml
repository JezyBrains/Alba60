version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    container_name: turufu-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: turufu-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434 # For local LLM access
      - ENVIRONMENT=production
    restart: unless-stopped
